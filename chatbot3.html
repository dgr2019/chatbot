<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DGuardian</title>

  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle, #ffffff 0%, #f2f2f2 55%, #e5e5e5 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    df-messenger {
      --df-messenger-bot-message: #FFFFFF !important;
      --df-messenger-bot-message-font-color: #D40511 !important;
      --df-messenger-user-message: #D40511 !important;
      --df-messenger-user-message-font-color: #FFFFFF !important;
      --df-messenger-chat-background-color: #FFF8E6 !important;
      --df-messenger-button-titlebar-color: #FFCC00 !important;
      --df-messenger-font-color: transparent !important;
      --df-messenger-send-icon: #D40511 !important;
      --df-messenger-input-box-color: #FFFFFF !important;
      --df-messenger-input-font-color: #191919 !important;
      --df-messenger-input-placeholder-font-color: #888888 !important;

      position: fixed;
      right: 70px;
      bottom: 75px;
      z-index: 998;
    }

    #dg-voice-bar {
      position: fixed;
      bottom: 24px;
      right: 150px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
    }

    .dg-btn {
      width: 58px;
      height: 58px;
      border: 3px solid #FFFFFF;
      border-radius: 50%;
      background: #D40511;
      color: #FFFFFF;
      font-size: 21px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s;
    }

    .dg-btn:hover {
      transform: translateY(-2px) scale(1.04);
    }

    .dg-btn.off {
      background: #777777;
    }

    .dg-btn.listening {
      background: #FFCC00;
      color: #D40511;
      animation: dg-pulse 1s infinite;
    }

    @keyframes dg-pulse {
      0% { box-shadow: 0 0 0 0 rgba(212,5,17,.45); }
      70% { box-shadow: 0 0 0 16px rgba(212,5,17,0); }
      100% { box-shadow: 0 0 0 0 rgba(212,5,17,0); }
    }

    #dg-lang {
      height: 58px;
      border: 2px solid #FFCC00;
      border-radius: 30px;
      background: #FFFFFF;
      color: #D40511;
      font-weight: 800;
      font-size: 14px;
      padding: 0 18px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.20);
    }

    #dg-status {
      position: fixed;
      bottom: 92px;
      right: 150px;
      background: #191919;
      color: #FFCC00;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 16px;
      z-index: 999;
      display: none;
    }
  </style>
</head>

<body>

  <div id="dg-status"></div>

  <div id="dg-voice-bar">
    <select id="dg-lang" title="Idioma / Language" aria-label="Idioma do chatbot">
      <option value="pt-br" selected>🇧🇷 PT</option>
      <option value="en">🇺🇸 EN</option>
    </select>

    <button id="dg-tts" class="dg-btn" title="Ouvir respostas do bot" aria-label="Ativar ou desativar leitura em voz alta">🔊</button>
    <button id="dg-mic" class="dg-btn" title="Falar com a DGuardian" aria-label="Falar com a DGuardian pelo microfone">🎤</button>
  </div>

  <div id="dg-container">
    <df-messenger
      intent="WELCOME"
      chat-title="DGuardian"
      agent-id="0e08ef10-1d77-401e-a0ff-e49389d31ded"
      language-code="pt-br"
      chat-icon="https://dgr2019.github.io/chatbot/dguardian-logo.png">
    </df-messenger>
  </div>

  <script>
    const AGENT_ID  = "0e08ef10-1d77-401e-a0ff-e49389d31ded";
    const CHAT_ICON = "https://dgr2019.github.io/chatbot/dguardian-logo.png";

    const UI_TEXT = {
      "pt-br": {
        title: "DGuardian",
        listening: "Ouvindo... pode falar 🎤",
        noMic: "Seu navegador não suporta reconhecimento de voz. Use o Chrome ou o Edge.",
        micDenied: "Permita o acesso ao microfone nas configurações do navegador.",
        ttsOn: "Leitura em voz alta ativada 🔊",
        ttsOff: "Leitura em voz alta desativada 🔇",
        langChanged: "Idioma alterado para Português. A conversa foi reiniciada."
      },
      "en": {
        title: "DGuardian",
        listening: "Listening... go ahead 🎤",
        noMic: "Your browser does not support speech recognition. Please use Chrome or Edge.",
        micDenied: "Please allow microphone access in your browser settings.",
        ttsOn: "Read-aloud enabled 🔊",
        ttsOff: "Read-aloud disabled 🔇",
        langChanged: "Language switched to English. The conversation was restarted."
      }
    };

    let currentLang = "pt-br";
    let ttsEnabled  = true;
    let recognition = null;
    let isListening = false;

    const micBtn   = document.getElementById("dg-mic");
    const ttsBtn   = document.getElementById("dg-tts");
    const langSel  = document.getElementById("dg-lang");
    const statusEl = document.getElementById("dg-status");

    let statusTimer = null;

    function showStatus(msg, ms = 3000) {
      statusEl.textContent = msg;
      statusEl.style.display = "block";
      clearTimeout(statusTimer);
      if (ms) statusTimer = setTimeout(() => statusEl.style.display = "none", ms);
    }

    function getDfInput() {
      try {
        const dfMessenger = document.querySelector("df-messenger");
        const chat  = dfMessenger.shadowRoot.querySelector("df-messenger-chat");
        const uiRoot = chat.shadowRoot.querySelector("df-messenger-user-input");
        return uiRoot.shadowRoot.querySelector("input");
      } catch (e) {
        return null;
      }
    }

    function openChat() {
      try {
        const dfMessenger = document.querySelector("df-messenger");
        if (!getDfInput()) {
          dfMessenger.shadowRoot.querySelector("#widgetIcon")?.click();
        }
      } catch (e) {}
    }

    function sendToBot(text) {
      openChat();

      setTimeout(() => {
        const input = getDfInput();
        if (!input) return;

        input.value = text;
        input.dispatchEvent(new Event("input", { bubbles: true }));
        input.dispatchEvent(new KeyboardEvent("keydown", {
          key: "Enter",
          code: "Enter",
          keyCode: 13,
          which: 13,
          bubbles: true
        }));
      }, 400);
    }

    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SR) {
        micBtn.style.display = "none";
        return;
      }

      recognition = new SR();
      recognition.lang = currentLang === "pt-br" ? "pt-BR" : "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        showStatus(UI_TEXT[currentLang].listening, 0);
      };

      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        sendToBot(text);
      };

      recognition.onerror = (e) => {
        if (e.error === "not-allowed") {
          showStatus(UI_TEXT[currentLang].micDenied);
        }
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        statusEl.style.display = "none";
      };
    }

    micBtn.addEventListener("click", () => {
      if (!recognition) {
        showStatus(UI_TEXT[currentLang].noMic);
        return;
      }

      if (isListening) {
        recognition.stop();
        return;
      }

      window.speechSynthesis.cancel();
      recognition.start();
    });

    function cleanForSpeech(text) {
      return (text || "")
        .replace(/<[^>]*>/g, " ")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function pickVoice(langCode) {
      const voices = window.speechSynthesis.getVoices();
      const prefix = langCode === "pt-br" ? "pt" : "en";

      return voices.find(v => v.lang.toLowerCase().startsWith(prefix) && /natural|google/i.test(v.name))
          || voices.find(v => v.lang.toLowerCase().startsWith(prefix))
          || null;
    }

    function speak(text) {
      const clean = cleanForSpeech(text);
      if (!clean) return;

      window.speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(clean);
      utter.lang = currentLang === "pt-br" ? "pt-BR" : "en-US";

      const voice = pickVoice(currentLang);
      if (voice) utter.voice = voice;

      utter.rate = 1.0;
      window.speechSynthesis.speak(utter);
    }

    window.speechSynthesis.onvoiceschanged = () => {};

    ttsBtn.addEventListener("click", () => {
      ttsEnabled = !ttsEnabled;
      ttsBtn.classList.toggle("off", !ttsEnabled);
      ttsBtn.textContent = ttsEnabled ? "🔊" : "🔇";

      if (!ttsEnabled) window.speechSynthesis.cancel();

      showStatus(ttsEnabled ? UI_TEXT[currentLang].ttsOn : UI_TEXT[currentLang].ttsOff);
    });

    function attachResponseListener() {
      const dfMessenger = document.querySelector("df-messenger");
      if (!dfMessenger) return;

      if (dfMessenger.dataset.dgResponseAttached === "true") return;
      dfMessenger.dataset.dgResponseAttached = "true";

      dfMessenger.addEventListener("df-response-received", (event) => {
        if (!ttsEnabled) return;

        const qr = event.detail?.response?.queryResult;
        if (!qr) return;

        let text = qr.fulfillmentText || "";

        if (!text && Array.isArray(qr.fulfillmentMessages)) {
          text = qr.fulfillmentMessages
            .map(m => m.text?.text?.join(" ") || "")
            .join(" ");
        }

        speak(text);
      });
    }

    function applyDGuardianVisual() {
      try {
        const df = document.querySelector("df-messenger");
        if (!df || !df.shadowRoot) return;

        const chat = df.shadowRoot.querySelector("df-messenger-chat");
        if (!chat || !chat.shadowRoot) return;

        if (!chat.shadowRoot.querySelector("#dg-custom-style")) {
          const style = document.createElement("style");
          style.id = "dg-custom-style";
          style.textContent = `
            header,
            .titlebar,
            .chat-title,
            #titlebar,
            #chat-title {
              height: 106px !important;
              min-height: 106px !important;
              background: linear-gradient(135deg, #FFCC00 0%, #FFD84A 100%) !important;
              border-radius: 24px 24px 0 0 !important;
              box-shadow: 0 8px 24px rgba(0,0,0,.14) !important;
              color: transparent !important;
              position: relative !important;
              overflow: hidden !important;
            }

            header::before,
            .titlebar::before,
            .chat-title::before,
            #titlebar::before,
            #chat-title::before {
              content: "";
              position: absolute;
              left: 28px;
              top: 30px;
              width: 150px;
              height: 42px;
              background-image: url("logo-dhl.png");
              background-size: contain;
              background-repeat: no-repeat;
              background-position: center;
              z-index: 10;
            }

            header::after,
            .titlebar::after,
            .chat-title::after,
            #titlebar::after,
            #chat-title::after {
              content: "DGuardian\\AEspecialista Internacional";
              white-space: pre;
              position: absolute;
              left: 228px;
              top: 25px;
              color: #D40511;
              font-size: 28px;
              font-weight: 800;
              line-height: 1.15;
              z-index: 10;
            }

            .message,
            .message-bubble,
            message-bubble,
            .bot-message,
            .server-response {
              background: #FFFFFF !important;
              color: #D40511 !important;
              border-radius: 18px !important;
              box-shadow: 0 6px 18px rgba(0,0,0,.10) !important;
            }
          `;
          chat.shadowRoot.appendChild(style);
        }

        const titleCandidates = chat.shadowRoot.querySelectorAll("header, .titlebar, .chat-title, #titlebar, #chat-title");
        titleCandidates.forEach(el => {
          el.innerHTML = "";
          el.style.height = "106px";
          el.style.minHeight = "106px";
          el.style.background = "linear-gradient(135deg, #FFCC00 0%, #FFD84A 100%)";
          el.style.borderRadius = "24px 24px 0 0";
          el.style.position = "relative";
          el.style.overflow = "hidden";

          if (!el.querySelector(".dg-real-header")) {
            const header = document.createElement("div");
            header.className = "dg-real-header";
            header.innerHTML = `
              <div style="
                height:106px;
                display:flex;
                align-items:center;
                padding:0 28px;
                background:linear-gradient(135deg,#FFCC00 0%,#FFD84A 100%);
                position:relative;
                overflow:hidden;
              ">
                <img src="logo-dhl.png" style="width:150px;height:auto;object-fit:contain;margin-right:26px;">
                <div style="width:2px;height:60px;background:#D40511;margin-right:28px;"></div>
                <div>
                  <div style="color:#D40511;font-size:28px;font-weight:800;line-height:1.05;">DGuardian</div>
                  <div style="color:#191919;font-size:17px;font-weight:400;margin-top:7px;">Especialista Internacional</div>
                </div>
              </div>
            `;
            el.appendChild(header);
          }
        });

      } catch (e) {}
    }

    function watchVisual() {
      applyDGuardianVisual();

      const observer = new MutationObserver(() => {
        applyDGuardianVisual();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });

      setInterval(applyDGuardianVisual, 800);
    }

    function rebuildMessenger(langCode) {
      const container = document.getElementById("dg-container");
      container.innerHTML = "";

      const df = document.createElement("df-messenger");
      df.setAttribute("intent", "WELCOME");
      df.setAttribute("chat-title", UI_TEXT[langCode].title);
      df.setAttribute("agent-id", AGENT_ID);
      df.setAttribute("language-code", langCode);
      df.setAttribute("chat-icon", CHAT_ICON);

      container.appendChild(df);

      setTimeout(() => {
        attachResponseListener();
        applyDGuardianVisual();
      }, 800);
    }

    langSel.addEventListener("change", () => {
      currentLang = langSel.value;
      window.speechSynthesis.cancel();

      if (recognition) {
        recognition.lang = currentLang === "pt-br" ? "pt-BR" : "en-US";
      }

      rebuildMessenger(currentLang);
      showStatus(UI_TEXT[currentLang].langChanged, 4000);
    });

    window.addEventListener("dfMessengerLoaded", () => {
      attachResponseListener();
      setTimeout(watchVisual, 700);
    });

    setupRecognition();
  </script>

</body>
</html>
