<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DGuardian</title>

  <!-- Dialogflow Messenger -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <style>
    :root {
      --dhl-red: #D40511;
      --dhl-yellow: #FFCC00;
      --dhl-gray: #F2F2F2;
      --dhl-white: #FFFFFF;
      --dhl-dark: #191919;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle, #FFFFFF 0%, #F2F2F2 55%, #E5E5E5 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ==================================================
       DIALOGFLOW MESSENGER
       ================================================== */

    df-messenger {
      --df-messenger-bot-message: #FFFFFF;
      --df-messenger-bot-message-font-color: #D40511;
      --df-messenger-user-message: #D40511;
      --df-messenger-user-message-font-color: #FFFFFF;

      /* FUNDO DO CHAT - cinza bem clarinho */
      --df-messenger-chat-background-color: #F2F2F2;

      /* LARGURA DA JANELA DO CHAT */
      --df-messenger-chat-window-width: 460px;
      --df-messenger-chat-window-height: 620px;

      --df-messenger-button-titlebar-color: #FFCC00;
      --df-messenger-font-color: #D40511;
      --df-messenger-send-icon: #D40511;
      --df-messenger-input-box-color: #FFFFFF;
      --df-messenger-input-font-color: #191919;
      --df-messenger-input-placeholder-font-color: #888888;

      position: fixed;
      right: 70px;
      bottom: 75px;
      z-index: 998;
    }

    /* ==================================================
       BARRA DE VOZ
       ================================================== */

    #dg-voice-bar {
      position: fixed;
      bottom: 24px;
      right: 150px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
    }

    /* ==================================================
       BOTÕES
       ================================================== */

    .dg-btn {
      width: 58px;
      height: 58px;
      border: 3px solid #FFFFFF;
      border-radius: 50%;
      background: #D40511;
      color: #FFFFFF;
      font-size: 21px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .dg-btn:hover {
      transform: translateY(-2px) scale(1.04);
    }

    .dg-btn:focus-visible {
      outline: 3px solid #FFCC00;
      outline-offset: 3px;
    }

    .dg-btn.off {
      background: #777777;
    }

    .dg-btn.listening {
      background: #FFCC00;
      color: #D40511;
      animation: dg-pulse 1s infinite;
    }

    @keyframes dg-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(212,5,17,.45); }
      70%  { box-shadow: 0 0 0 16px rgba(212,5,17,0); }
      100% { box-shadow: 0 0 0 0 rgba(212,5,17,0); }
    }

    /* ==================================================
       SELETOR DE IDIOMA
       ================================================== */

    #dg-lang {
      height: 58px;
      border: 2px solid #FFCC00;
      border-radius: 30px;
      background: #FFFFFF;
      color: #D40511;
      font-weight: 800;
      font-size: 14px;
      padding: 0 18px;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.20);
    }

    /* ==================================================
       STATUS
       ================================================== */

    #dg-status {
      position: fixed;
      bottom: 92px;
      right: 150px;
      background: #191919;
      color: #FFCC00;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 16px;
      z-index: 999;
      display: none;
      box-shadow: 0 8px 22px rgba(0,0,0,.22);
    }

    /* ==================================================
       RESPONSIVO
       ================================================== */

    @media (max-width: 700px) {
      df-messenger {
        right: 18px;
        bottom: 88px;
        --df-messenger-chat-window-width: 92vw;
      }
      #dg-voice-bar {
        right: 70px;
        bottom: 22px;
      }
      .dg-btn {
        width: 50px;
        height: 50px;
      }
      #dg-lang {
        height: 50px;
        padding: 0 12px;
      }
      #dg-status {
        right: 18px;
        bottom: 82px;
      }
    }
  </style>
</head>

<body>

  <!-- STATUS -->
  <div id="dg-status"></div>

  <!-- CONTROLES -->
  <div id="dg-voice-bar">
    <select id="dg-lang" title="Idioma / Language" aria-label="Idioma do chatbot">
      <option value="pt-br" selected>🇧🇷 PT</option>
      <option value="en">🇺🇸 EN</option>
    </select>

    <button id="dg-tts" class="dg-btn" title="Ouvir respostas do bot"
      aria-label="Ativar ou desativar leitura em voz alta">🔊</button>

    <button id="dg-mic" class="dg-btn" title="Falar com a DGuardian"
      aria-label="Falar com a DGuardian pelo microfone">🎤</button>
  </div>

  <!-- CHAT -->
  <div id="dg-container">
    <df-messenger
      intent="WELCOME"
      chat-title="DGuardian"
      agent-id="0e08ef10-1d77-401e-a0ff-e49389d31ded"
      language-code="pt-br"
      chat-icon="https://dgr2019.github.io/chatbot/dguardian-logo.png">
    </df-messenger>
  </div>


  <script>
    /* ==================================================
       CONFIGURAÇÕES
       ================================================== */

    const AGENT_ID  = "0e08ef10-1d77-401e-a0ff-e49389d31ded";
    const CHAT_ICON = "https://dgr2019.github.io/chatbot/dguardian-logo.png";
    const DHL_LOGO  = "https://dgr2019.github.io/chatbot/logo-dhl.png";

    /* cor de fundo do chat */
    const CHAT_BG = "#F2F2F2";

    /* largura da janela do chat (px) */
    const CHAT_WIDTH = 460;

    /* tamanho do avatar (px) - estilo WhatsApp */
    const AVATAR_SIZE = 30;

    const UI_TEXT = {
      "pt-br": {
        title: "DGuardian",
        subtitle: "Especialista Internacional",
        listening: "Ouvindo... pode falar 🎤",
        noMic: "Seu navegador não suporta reconhecimento de voz. Use o Chrome ou o Edge.",
        micDenied: "Permita o acesso ao microfone nas configurações do navegador.",
        ttsOn: "Leitura em voz alta ativada 🔊",
        ttsOff: "Leitura em voz alta desativada 🔇",
        langChanged: "Idioma alterado para Português. A conversa foi reiniciada.",
        linkLabel: "Abrir link",
        mailTitle: "Clique para enviar um e-mail",
        youAlt: "Você"
      },
      "en": {
        title: "DGuardian",
        subtitle: "International Specialist",
        listening: "Listening... go ahead 🎤",
        noMic: "Your browser does not support speech recognition. Please use Chrome or Edge.",
        micDenied: "Please allow microphone access in your browser settings.",
        ttsOn: "Read-aloud enabled 🔊",
        ttsOff: "Read-aloud disabled 🔇",
        langChanged: "Language switched to English. The conversation was restarted.",
        linkLabel: "Open link",
        mailTitle: "Click to send an email",
        youAlt: "You"
      }
    };

    let currentLang = "pt-br";
    let ttsEnabled  = true;
    let recognition = null;
    let isListening = false;

    const micBtn   = document.getElementById("dg-mic");
    const ttsBtn   = document.getElementById("dg-tts");
    const langSel  = document.getElementById("dg-lang");
    const statusEl = document.getElementById("dg-status");

    let statusTimer = null;

    /* ==================================================
       STATUS
       ================================================== */

    function showStatus(msg, ms = 3000) {
      statusEl.textContent = msg;
      statusEl.style.display = "block";
      clearTimeout(statusTimer);
      if (ms) {
        statusTimer = setTimeout(() => {
          statusEl.style.display = "none";
        }, ms);
      }
    }

    /* ==================================================
       CABEÇALHO DHL (dentro do próprio chat)
       ================================================== */

    function customizeTitlebar() {
      try {
        const dfMessenger = document.querySelector("df-messenger");
        const chat = dfMessenger.shadowRoot.querySelector("df-messenger-chat");
        const titlebar = chat.shadowRoot.querySelector("df-messenger-titlebar");
        const root = titlebar.shadowRoot;
        if (!root) return false;

        /* já aplicado? só atualiza o subtítulo (troca de idioma) */
        const existing = root.querySelector("#dhl-header");
        if (existing) {
          existing.querySelector(".dhl-sub").textContent =
            UI_TEXT[currentLang].subtitle;
          return true;
        }

        const wrapper =
          root.querySelector(".title-wrapper") ||
          root.querySelector("div");
        if (!wrapper) return false;

        const st = document.createElement("style");
        st.id = "dhl-header-style";
        st.textContent = `
          .title-wrapper {
            background: linear-gradient(180deg, #FFD84D 0%, #FFCC00 100%) !important;
            min-height: 72px !important;
            padding: 10px 16px !important;
            position: relative !important;
            overflow: hidden !important;
            display: flex !important;
            align-items: center !important;
          }

          .title-wrapper::after {
            content: "";
            position: absolute;
            right: 30px;
            top: 0;
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg,
              transparent 0 12%,
              rgba(255,255,255,.30) 12% 28%,
              transparent 28% 36%,
              rgba(255,255,255,.22) 36% 58%,
              transparent 58% 64%,
              rgba(255,255,255,.15) 64% 100%);
            transform: skewX(-30deg);
            pointer-events: none;
          }

          .title-wrapper .title,
          .title-wrapper h2,
          .title-wrapper span.title {
            display: none !important;
          }

          .title-wrapper #minimizeIcon,
          .title-wrapper .minimize-icon,
          .title-wrapper button {
            position: relative;
            z-index: 2;
            filter: invert(14%) sepia(93%) saturate(6394%)
                    hue-rotate(352deg) brightness(85%) contrast(115%);
          }

          #dhl-header {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
            position: relative;
            z-index: 2;
            font-family: Arial, Helvetica, sans-serif;
          }
          #dhl-header img.dhl-logo {
            height: 24px;
            flex-shrink: 0;
          }
          #dhl-header .dhl-divider {
            width: 3px;
            height: 40px;
            background: #D40511;
            border-radius: 2px;
            flex-shrink: 0;
          }
          #dhl-header .dhl-text {
            line-height: 1.2;
            min-width: 0;
          }
          #dhl-header .dhl-title {
            display: block;
            color: #D40511;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: .2px;
            white-space: nowrap;
          }
          #dhl-header .dhl-sub {
            display: block;
            color: #191919;
            font-size: 13px;
            white-space: nowrap;
          }
        `;
        root.appendChild(st);

        const hdr = document.createElement("div");
        hdr.id = "dhl-header";

        const logo = document.createElement("img");
        logo.className = "dhl-logo";
        logo.src = DHL_LOGO;
        logo.alt = "DHL";

        const divider = document.createElement("div");
        divider.className = "dhl-divider";

        const txt = document.createElement("div");
        txt.className = "dhl-text";

        const t = document.createElement("span");
        t.className = "dhl-title";
        t.textContent = "DGuardian";

        const s = document.createElement("span");
        s.className = "dhl-sub";
        s.textContent = UI_TEXT[currentLang].subtitle;

        txt.appendChild(t);
        txt.appendChild(s);

        hdr.appendChild(logo);
        hdr.appendChild(divider);
        hdr.appendChild(txt);

        wrapper.insertBefore(hdr, wrapper.firstChild);

        return true;

      } catch (e) {
        return false;
      }
    }

    let titlebarTimer = null;

    function customizeTitlebarWithRetries(tries = 40) {
      clearInterval(titlebarTimer);
      titlebarTimer = setInterval(() => {
        if (customizeTitlebar() || --tries <= 0) {
          clearInterval(titlebarTimer);
        }
      }, 300);
    }

    /* ==================================================
       FUNDO CINZA + LARGURA DA JANELA
       ================================================== */

    const BG_CSS = `
      df-messenger-chat,
      .chat-wrapper,
      [class*='chat-wrapper'] {
        width: ${CHAT_WIDTH}px !important;
        max-width: 96vw !important;
      }
      .chat-wrapper,
      .message-list-wrapper,
      [class*='chat-wrapper'],
      [class*='message-list'] {
        background: ${CHAT_BG} !important;
        background-color: ${CHAT_BG} !important;
      }
      /* garante que nada estoure a largura */
      .message-list-wrapper,
      [class*='message-list'] {
        overflow-x: hidden !important;
      }
    `;

    function injectBg(root, id) {
      if (!root || root.querySelector("#" + id)) return;
      const st = document.createElement("style");
      st.id = id;
      st.textContent = BG_CSS;
      root.appendChild(st);
    }

    function applyChatBackground() {
      try {
        const df = document.querySelector("df-messenger");
        if (!df || !df.shadowRoot) return false;

        df.style.setProperty("--df-messenger-chat-background-color", CHAT_BG);
        df.style.setProperty("--df-messenger-chat-background", CHAT_BG);
        df.style.setProperty("--df-messenger-chat-window-width", CHAT_WIDTH + "px");

        injectBg(df.shadowRoot, "dhl-bg-0");

        const chat = df.shadowRoot.querySelector("df-messenger-chat");
        if (!chat || !chat.shadowRoot) return false;
        injectBg(chat.shadowRoot, "dhl-bg-1");

        const list =
          chat.shadowRoot.querySelector("df-message-list") ||
          chat.shadowRoot.querySelector("[class*='message-list']");
        if (list && list.shadowRoot) injectBg(list.shadowRoot, "dhl-bg-2");

        return !!list;
      } catch (e) {
        return false;
      }
    }

    let bgTimer = null;

    function applyChatBackgroundWithRetries(tries = 40) {
      clearInterval(bgTimer);
      bgTimer = setInterval(() => {
        if (applyChatBackground() || --tries <= 0) {
          clearInterval(bgTimer);
        }
      }, 300);
    }

    /* ==================================================
       ESTILO DAS MENSAGENS (links, e-mails e balões)
       ================================================== */

    function injectMsgStyle(root) {
      if (!root || root.querySelector("#dhl-msg-style")) return;
      const st = document.createElement("style");
      st.id = "dhl-msg-style";
      st.textContent = `
        a.dhl-link, a.dhl-mail {
          display: inline;
          color: #D40511 !important;
          font-weight: bold;
          text-decoration: underline;
          cursor: pointer;
          overflow-wrap: anywhere;
        }
        a.dhl-link:hover, a.dhl-mail:hover {
          background: #FFCC00;
          text-decoration: none;
          border-radius: 3px;
        }
        /* o balão precisa poder encolher dentro da linha flex,
           senão o texto vaza para fora da janela */
        .dhl-row .message,
        .dhl-row [class*='message'] {
          min-width: 0 !important;
          max-width: 100% !important;
          overflow-wrap: anywhere !important;
          word-break: break-word !important;
        }
      `;
      root.appendChild(st);
    }

    /* ==================================================
       AVATARES (fotinha ao lado de cada mensagem)
       ================================================== */

    function isUserMsg(el) {
      return /user-message|userMessage/i.test(el.className || "");
    }

    function styleAvatar(img, isUser) {
      const s = img.style;
      const set = (k, v) => s.setProperty(k, v, "important");

      set("width",  AVATAR_SIZE + "px");
      set("height", AVATAR_SIZE + "px");
      set("min-width",  AVATAR_SIZE + "px");
      set("min-height", AVATAR_SIZE + "px");
      set("max-width",  AVATAR_SIZE + "px");
      set("max-height", AVATAR_SIZE + "px");
      set("border-radius", "50%");
      set("flex-shrink", "0");
      set("background", "#FFCC00");
      set("display", "block");
      set("box-sizing", "border-box");

      if (isUser) {
        set("object-fit", "contain");
        set("padding", "5px 3px");
      } else {
        set("object-fit", "cover");
        set("padding", "2px");
      }
    }

    function styleRow(row, isUser) {
      const s = row.style;
      const set = (k, v) => s.setProperty(k, v, "important");

      set("display", "flex");
      set("align-items", "flex-end");
      set("gap", "7px");
      set("margin", "8px 0");
      set("width", "100%");
      set("max-width", "100%");
      set("box-sizing", "border-box");
      set("flex-direction", isUser ? "row-reverse" : "row");
      /* mensagens do usuário encostam à direita, do bot à esquerda */
      set("justify-content", "flex-start");
    }

    /* deixa o balão encolher e quebrar linha dentro da linha flex */
    function styleBubble(msg) {
      const set = (k, v) => msg.style.setProperty(k, v, "important");
      set("margin", "0");
      set("min-width", "0");
      set("flex", "0 1 auto");
      /* deixa espaço para o avatar + gap */
      set("max-width", "calc(100% - " + (AVATAR_SIZE + 14) + "px)");
      set("overflow-wrap", "anywhere");
      set("word-break", "break-word");
      set("box-sizing", "border-box");
    }

    function addAvatars(root) {
      const msgs = root.querySelectorAll(
        ".bot-message, .user-message, [class*='bot-message'], [class*='user-message']"
      );

      msgs.forEach(msg => {
        if (msg.parentElement &&
            msg.parentElement.classList.contains("dhl-row")) {
          styleBubble(msg);   /* reforça em quem já foi tratado */
          return;
        }
        if (msg.dataset.dhlAvatar === "1") return;
        msg.dataset.dhlAvatar = "1";

        const user = isUserMsg(msg);

        const row = document.createElement("div");
        row.className = "dhl-row";
        styleRow(row, user);

        const img = document.createElement("img");
        img.src = user ? DHL_LOGO : CHAT_ICON;
        img.alt = user ? UI_TEXT[currentLang].youAlt : "DGuardian";
        styleAvatar(img, user);

        styleBubble(msg);

        msg.parentNode.insertBefore(row, msg);
        row.appendChild(img);
        row.appendChild(msg);
      });
    }

    /* ==================================================
       LINKS E E-MAILS CLICÁVEIS
       ================================================== */

    const LINK_RE =
      /(https?:\/\/[^\s<>"'`]+)|([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})/g;

    function trimTail(txt) {
      let cut = "";
      while (txt.length && ".,;:!?".includes(txt.slice(-1))) {
        cut = txt.slice(-1) + cut;
        txt = txt.slice(0, -1);
      }
      const pares = [[")", "("], ["]", "["], ["}", "{"]];
      let mudou = true;
      while (mudou && txt.length) {
        mudou = false;
        for (const [fim, ini] of pares) {
          if (txt.endsWith(fim)) {
            const abre  = (txt.match(new RegExp("\\" + ini, "g")) || []).length;
            const fecha = (txt.match(new RegExp("\\" + fim, "g")) || []).length;
            if (fecha > abre) {
              cut = fim + cut;
              txt = txt.slice(0, -1);
              mudou = true;
            }
          }
        }
      }
      return [txt, cut];
    }

    function linkifyNode(node) {
      const texto = node.nodeValue;
      if (!texto) return false;
      if (!/https?:\/\//i.test(texto) && !/@/.test(texto)) return false;

      LINK_RE.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let pos = 0, m, achou = false;

      while ((m = LINK_RE.exec(texto)) !== null) {
        const ehUrl = !!m[1];
        const [alvo, sobra] = trimTail(m[0]);
        if (!alvo) continue;

        if (m.index > pos) {
          frag.appendChild(document.createTextNode(texto.slice(pos, m.index)));
        }

        const a = document.createElement("a");

        if (ehUrl) {
          a.className = "dhl-link";
          a.href = alvo;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.title = alvo;
          a.textContent = UI_TEXT[currentLang].linkLabel;
        } else {
          a.className = "dhl-mail";
          a.href = "mailto:" + alvo;
          a.title = UI_TEXT[currentLang].mailTitle;
          a.textContent = alvo;
        }

        frag.appendChild(a);
        achou = true;

        if (sobra) frag.appendChild(document.createTextNode(sobra));
        pos = m.index + m[0].length;
      }

      if (!achou) return false;
      if (pos < texto.length) {
        frag.appendChild(document.createTextNode(texto.slice(pos)));
      }

      node.parentNode.replaceChild(frag, node);
      return true;
    }

    function linkifyMessages(root) {
      const msgs = root.querySelectorAll(
        ".bot-message, [class*='bot-message'], [class*='botMessage']"
      );

      msgs.forEach(msg => {
        if (msg.dataset.dhlLinked === "1") return;
        msg.dataset.dhlLinked = "1";

        const walker = document.createTreeWalker(msg, NodeFilter.SHOW_TEXT, null);
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);

        nodes.forEach(n => {
          if (n.parentElement && n.parentElement.closest("a")) return;
          linkifyNode(n);
        });
      });
    }

    /* ==================================================
       TEXTO BRANCO NO BALÃO DO USUÁRIO
       ================================================== */

    let msgObserver = null;
    let msgTimer = null;

    function getMessageListRoot() {
      try {
        const dfMessenger = document.querySelector("df-messenger");
        const chat = dfMessenger.shadowRoot.querySelector("df-messenger-chat");
        const list =
          chat.shadowRoot.querySelector("df-message-list") ||
          chat.shadowRoot.querySelector("df-messenger-message-list") ||
          chat.shadowRoot.querySelector("[class*='message-list']");
        if (!list) return null;
        return list.shadowRoot || list;
      } catch (e) {
        return null;
      }
    }

    function paintUserMessages(root) {
      const userMsgs = root.querySelectorAll(
        ".user-message, [class*='user-message'], [class*='userMessage']"
      );
      userMsgs.forEach(el => {
        el.style.setProperty("color", "#FFFFFF", "important");
        el.querySelectorAll("*").forEach(child => {
          child.style.setProperty("color", "#FFFFFF", "important");
        });
      });
    }

    /* um único observer cuida da cor, dos links e dos avatares */
    function processMessages(root) {
      if (msgObserver) msgObserver.disconnect();   /* evita loop */

      paintUserMessages(root);
      linkifyMessages(root);
      addAvatars(root);

      if (msgObserver) {
        msgObserver.observe(root, { childList: true, subtree: true });
      }
    }

    function setupMessageWatcher() {
      const root = getMessageListRoot();
      if (!root) return false;

      injectMsgStyle(root);

      if (msgObserver) msgObserver.disconnect();
      msgObserver = new MutationObserver(() => processMessages(root));

      processMessages(root);
      msgObserver.observe(root, { childList: true, subtree: true });

      return true;
    }

    function setupMessageWatcherWithRetries(tries = 40) {
      clearInterval(msgTimer);
      msgTimer = setInterval(() => {
        if (setupMessageWatcher() || --tries <= 0) {
          clearInterval(msgTimer);
        }
      }, 300);
    }

    /* ==================================================
       INPUT DO DIALOGFLOW
       ================================================== */

    function getDfInput() {
      try {
        const dfMessenger = document.querySelector("df-messenger");
        const chat = dfMessenger.shadowRoot.querySelector("df-messenger-chat");
        const uiRoot = chat.shadowRoot.querySelector("df-messenger-user-input");
        return uiRoot.shadowRoot.querySelector("input");
      } catch (e) {
        return null;
      }
    }

    /* ==================================================
       ABRIR CHAT
       ================================================== */

    function openChat() {
      try {
        const dfMessenger = document.querySelector("df-messenger");
        if (!getDfInput()) {
          dfMessenger.shadowRoot.querySelector("#widgetIcon")?.click();
        }
      } catch (e) {}
    }

    /* ==================================================
       ENVIAR TEXTO AO BOT
       ================================================== */

    function sendToBot(text) {
      openChat();
      setTimeout(() => {
        const input = getDfInput();
        if (!input) return;
        input.value = text;
        input.dispatchEvent(new Event("input", { bubbles: true }));
        input.dispatchEvent(new KeyboardEvent("keydown", {
          key: "Enter", code: "Enter", keyCode: 13, which: 13, bubbles: true
        }));
      }, 400);
    }

    /* ==================================================
       MICROFONE
       ================================================== */

    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        micBtn.style.display = "none";
        return;
      }

      recognition = new SR();
      recognition.lang = currentLang === "pt-br" ? "pt-BR" : "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        showStatus(UI_TEXT[currentLang].listening, 0);
      };

      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        sendToBot(text);
      };

      recognition.onerror = (e) => {
        if (e.error === "not-allowed") {
          showStatus(UI_TEXT[currentLang].micDenied);
        }
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        statusEl.style.display = "none";
      };
    }

    micBtn.addEventListener("click", () => {
      if (!recognition) {
        showStatus(UI_TEXT[currentLang].noMic);
        return;
      }
      if (isListening) {
        recognition.stop();
        return;
      }
      window.speechSynthesis.cancel();
      recognition.start();
    });

    /* ==================================================
       LIMPEZA DO TEXTO PARA VOZ
       (URLs e e-mails são ignorados na narração)
       ================================================== */

    function cleanForSpeech(text) {
      return (text || "")
        .replace(/<[^>]*>/g, " ")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/g, "")
        .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    /* ==================================================
       ESCOLHA DE VOZ
       ================================================== */

    function pickVoice(langCode) {
      const voices = window.speechSynthesis.getVoices();
      const prefix = langCode === "pt-br" ? "pt" : "en";
      return (
        voices.find(v =>
          v.lang.toLowerCase().startsWith(prefix) &&
          /natural|google/i.test(v.name)
        ) ||
        voices.find(v => v.lang.toLowerCase().startsWith(prefix)) ||
        null
      );
    }

    /* ==================================================
       FALAR RESPOSTA
       ================================================== */

    function speak(text) {
      const clean = cleanForSpeech(text);
      if (!clean) return;

      window.speechSynthesis.cancel();

      const falar = () => {
        const utter = new SpeechSynthesisUtterance(clean);
        utter.lang = currentLang === "pt-br" ? "pt-BR" : "en-US";
        const voice = pickVoice(currentLang);
        if (voice) utter.voice = voice;
        utter.rate = 1.0;
        window.speechSynthesis.speak(utter);
      };

      if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.addEventListener(
          "voiceschanged", falar, { once: true }
        );
        setTimeout(falar, 500);   /* rede de segurança */
      } else {
        falar();
      }
    }

    window.speechSynthesis.onvoiceschanged = () => {};

    /* ==================================================
       BOTÃO TTS
       ================================================== */

    ttsBtn.addEventListener("click", () => {
      ttsEnabled = !ttsEnabled;
      ttsBtn.classList.toggle("off", !ttsEnabled);
      ttsBtn.textContent = ttsEnabled ? "🔊" : "🔇";
      if (!ttsEnabled) window.speechSynthesis.cancel();
      showStatus(ttsEnabled ? UI_TEXT[currentLang].ttsOn : UI_TEXT[currentLang].ttsOff);
    });

    /* ==================================================
       LISTENER DAS RESPOSTAS
       ================================================== */

    function attachResponseListener(dfMessenger) {
      if (!dfMessenger) dfMessenger = document.querySelector("df-messenger");
      if (!dfMessenger) return;

      if (dfMessenger.dataset.dgResponseAttached === "true") return;
      dfMessenger.dataset.dgResponseAttached = "true";

      dfMessenger.addEventListener("df-response-received", (event) => {
        if (!ttsEnabled) return;

        const qr = event.detail?.response?.queryResult;
        if (!qr) return;

        let text = qr.fulfillmentText || "";

        if (!text && Array.isArray(qr.fulfillmentMessages)) {
          text = qr.fulfillmentMessages
            .map(m => m.text?.text?.join(" ") || "")
            .join(" ");
        }

        speak(text);
      });
    }

    /* conecta já, sem esperar o dfMessengerLoaded */
    attachResponseListener(document.querySelector("df-messenger"));

    /* ==================================================
       TROCA DE IDIOMA
       ================================================== */

    function rebuildMessenger(langCode) {
      const container = document.getElementById("dg-container");
      container.innerHTML = "";

      const df = document.createElement("df-messenger");
      df.setAttribute("intent", "WELCOME");
      df.setAttribute("chat-title", UI_TEXT[langCode].title);
      df.setAttribute("agent-id", AGENT_ID);
      df.setAttribute("language-code", langCode);
      df.setAttribute("chat-icon", CHAT_ICON);

      /* CRÍTICO: listener conectado ANTES do appendChild,
         para garantir que a saudação seja narrada */
      attachResponseListener(df);

      container.appendChild(df);

      customizeTitlebarWithRetries();
      applyChatBackgroundWithRetries();
      setupMessageWatcherWithRetries();
    }

    langSel.addEventListener("change", () => {
      currentLang = langSel.value;
      window.speechSynthesis.cancel();

      if (recognition) {
        recognition.lang = currentLang === "pt-br" ? "pt-BR" : "en-US";
      }

      rebuildMessenger(currentLang);
      showStatus(UI_TEXT[currentLang].langChanged, 4000);
    });

    /* ==================================================
       INICIALIZAÇÃO
       ================================================== */

    window.addEventListener("dfMessengerLoaded", () => {
      attachResponseListener(document.querySelector("df-messenger"));
      customizeTitlebarWithRetries();
      applyChatBackgroundWithRetries();
      setupMessageWatcherWithRetries();
    });

    setupRecognition();

  </script>

</body>
</html>
